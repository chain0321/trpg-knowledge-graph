  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

  .link-symbol {

    pointer-events: none;
  }
  .link-category {
    stroke: #333333; stroke-width: 0.8px; stroke-opacity: 0.18;
    pointer-events: none;
  }
  .link-instance {
    stroke: #aaaaaa; stroke-width: 0.8px; stroke-opacity: 0.30;
    stroke-dasharray: 3 3; pointer-events: none;
  }

  .link-archetype.link-highlight { stroke-opacity: 0.75; stroke-width: 2.5px; }
  .link-symbol.link-highlight { stroke-opacity: 0.7; stroke-width: 2px; }
  .link-category.link-highlight { stroke-opacity: 0.6; stroke-width: 1.5px; }
  .link-instance.link-highlight { stroke-opacity: 0.4; stroke-width: 1.2px; stroke-dasharray: none; }

  .node-circle {
    cursor: pointer;
    transition: opacity 0.3s;
  }
  .node-instance {
    cursor: pointer;
    transition: opacity 0.3s, fill 0.2s, font-size 0.2s;
  }

  .circle-archetype {
    fill: #C8102E; stroke: rgba(160,0,0,0.2); stroke-width: 2;
  }
  /* 象征层 (Layer 2) */
  .circle-symbol {
    fill: #2E5CB8; stroke: rgba(30,60,150,0.2); stroke-width: 1.5;
  }
  /* 范畴层 (Layer 3) */
  .circle-category {
    fill: #333333; stroke: rgba(0,0,0,0.12); stroke-width: 1;
  }

  /* 圆圈内文字 */
  .circle-label {
    fill: #fff; font-size: 11px; text-anchor: middle; pointer-events: none;
    font-weight: 500; dominant-baseline: central;
  }
  /* 原型层标签（图片下方） */
  .arch-label {
    fill: rgba(0,0,0,0.6); font-size: 11px; text-anchor: middle; pointer-events: none;

  .instance-text {

  .circle-highlight-blue {

  }
  .instance-highlight {
    fill: #C8102E !important; font-size: 11px !important; font-weight: 600;

    .attr("width", "180%").attr("height", "180%");

    .attr("dx", 0).attr("dy", 0)
    .attr("stdDeviation", 6)
    .attr("flood-color", "#C8102E")

    .attr("x", "-40%").attr("y", "-40%")
    .attr("width", "180%").attr("height", "180%");

    .attr("dx", 0).attr("dy", 0)
    .attr("stdDeviation", 5)
    .attr("flood-color", "#2E5CB8")

  defs.append("clipPath").attr("id", "archClip")

  const shadowFilter = defs.append("filter")
    .attr("id", "shadow")

  // ========== 数据生成 ==========

  // ========== 构建节点和连线 ==========
  const nodesData = [];
  const linksData = [];

  function addNode(id, label, layer, group, r, color, parentId, ringRadius, desc) {
    nodesData.push({
      id, label, layer, group, r, color, parentId, ringRadius,
      desc: desc || "",
      x: 0, y: 0, angle: 0,
    });
    return id;
  }

  // 游历原型定义，生成节点和连线
  archetypeDefs.forEach(arch => {
    const archId = addNode(arch.id, arch.label, 1, "archetype", 30, "#C8102E", null, RING1);

    arch.symbols.forEach((sym, si) => {
      const symId = addNode(arch.id + "_sym" + si, sym.label, 2, "symbol", 20, "#2E5CB8", archId, RING2);
      linksData.push({ source: archId, target: symId, layer: 1, type: "archetype" });

      sym.cats.forEach((cat, ci) => {
        const catId = addNode(symId + "_cat" + ci, cat.label, 3, "category", 12, "#333333", symId, RING3);
        linksData.push({ source: symId, target: catId, layer: 2, type: "symbol" });

        const existingCount = (cat.instances || []).length;
        (cat.instances || []).forEach((inst, ii) => {
          const instId = addNode(catId + "_inst" + ii, inst.label, 4, "instance", 0, null, catId, RING4, inst.desc);
          linksData.push({ source: catId, target: instId, layer: 3, type: "category" });
        });

        // 每个范畴补充到至少3个实例（≈原来3倍）
        const targetCount = 3;
        for (let j = existingCount; j < targetCount; j++) {
          const extraLabel = cat.label + (j === 0 ? "实例" : "实例" + (j + 1));
          const instId = addNode(catId + "_inst" + j, extraLabel, 4, "instance", 0, null, catId, RING4,
            "关于" + cat.label + "的叙事案例" + (j + 1) + "。");
          linksData.push({ source: catId, target: instId, layer: 3, type: "category" });
        }
      });
    });
  });

  // 分类各层节点
  const archetypeNodes = nodesData.filter(d => d.layer === 1);
  const symbolNodes = nodesData.filter(d => d.layer === 2);
  const categoryNodes = nodesData.filter(d => d.layer === 3);
  const instanceNodes = nodesData.filter(d => d.layer === 4);
  const circleNodes = nodesData.filter(d => d.layer <= 3);

  // 原型图片分配（按定义顺序对应12张图）
  const archImageFiles = [
    "画板 13.jpg", "画板 15.jpg", "画板 16.jpg", "画板 17.jpg",

  // 更新统计
  document.getElementById("stats").textContent =
    "原型 " + archetypeNodes.length + " · 象征 " + symbolNodes.length +
    " · 范畴 " + categoryNodes.length + " · 实例 " + instanceNodes.length;

  // ========== 初始径向定位 ==========
  function assignRadialPositions() {
    // 原型均匀分布
    const archCount = archetypeNodes.length;
    archetypeNodes.forEach((node, i) => {
      node.angle = (2 * Math.PI * i) / archCount - Math.PI / 2;
      node.x = CX + RING1 * Math.cos(node.angle);
      node.y = CY + RING1 * Math.sin(node.angle);
    });

    // 递归定位子节点
    const idMap = new Map(nodesData.map(n => [n.id, n]));

    function positionDescendants(parentId) {
      const children = nodesData.filter(n => n.parentId === parentId);
      if (children.length === 0) return;
      const parent = idMap.get(parentId);
      if (!parent || parent.angle == null) return;

      const spread = children[0].layer === 2 ? Math.PI / 5    // 象征层展开~36°
                   : children[0].layer === 3 ? Math.PI / 6    // 范畴层展开~30°
                   : Math.PI / 7;                              // 实例层展开~26°

      const count = children.length;
      const half = spread / 2;
      const step = count > 1 ? spread / (count - 1) : 0;

      children.forEach((child, i) => {
        const offset = count > 1 ? -half + i * step : 0;
        child.angle = parent.angle + offset;
        child.x = CX + child.ringRadius * Math.cos(child.angle);
        child.y = CY + child.ringRadius * Math.sin(child.angle);
        if (child.layer < 4) positionDescendants(child.id);
      });
    }

    archetypeNodes.forEach(a => positionDescendants(a.id));
  }

  assignRadialPositions();

  // ========== 力模拟 ==========
  const simulation = d3.forceSimulation(nodesData)
    .force("link", d3.forceLink(linksData).id(d => d.id)
      .distance(d => {
        if (d.type === "archetype") return RING2 - RING1;
        if (d.type === "symbol")    return RING3 - RING2;
        if (d.type === "category")  return RING4 - RING3;
        return 120;
      })
      .strength(d => {
        if (d.type === "archetype") return 0.22;
        if (d.type === "symbol")    return 0.15;
        if (d.type === "category")  return 0.08;
        return 0.04;
      })
    )
    .force("charge", d3.forceManyBody().strength(d => {
      if (d.layer === 1) return -350;
      if (d.layer === 2) return -200;
      if (d.layer === 3) return -80;
      return -20;
    }))
    .force("collision", d3.forceCollide().radius(d => {
      if (d.layer === 1) return 38;
      if (d.layer === 2) return 26;
      if (d.layer === 3) return 16;
      return (d.label || "").length * 3;
    }))
    .force("center", d3.forceCenter(CX, CY).strength(0.02))
    .force("radial", function(alpha) {
      for (const node of nodesData) {
        if (node.ringRadius == null || (node.fx != null && node.fy != null)) continue;
        const dx = node.x - CX;
        const dy = node.y - CY;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const targetX = CX + node.ringRadius * (dx / dist);
        const targetY = CY + node.ringRadius * (dy / dist);
        const strength = node.layer === 1 ? 0.25 : node.layer === 2 ? 0.18 : node.layer === 3 ? 0.12 : 0.06;
        node.vx += (targetX - node.x) * strength * alpha;
        node.vy += (targetY - node.y) * strength * alpha;
      }
    })
    .force("angular-spread", function(alpha) {
      // 保持原型均匀分布
      const N = archetypeNodes.length;
      archetypeNodes.forEach((node, i) => {
        const targetAngle = (2 * Math.PI * i) / N - Math.PI / 2;
        const currentAngle = Math.atan2(node.y - CY, node.x - CX);
        let diff = targetAngle - currentAngle;
        while (diff > Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        const strength = 0.06 * alpha * node.ringRadius;
        node.vx += Math.cos(currentAngle + Math.PI / 2) * diff * strength;
        node.vy += Math.sin(currentAngle + Math.PI / 2) * diff * strength;
      });
    })
    .alphaDecay(0.018)
    .alphaMin(0.002);

  // ========== 缩放 ==========
  const zoomGroup = svg.append("g").attr("class", "zoom-group");

  const zoom = d3.zoom()

  svg.call(zoom);

  const initScale = Math.min(W, H) / (RING4 * 2.3);

  // ========== 绘制连线 ==========

  const linkArchetype = linkGroup.selectAll("line.link-archetype")

  const linkInstance = linkGroup.selectAll("line.link-instance")

    .join("line").attr("class", "link-instance");

  const allLinkGroups = { linkArchetype, linkSymbol, linkInstance };

  // ========== 绘制节点 ==========
  const nodeGroup = zoomGroup.append("g").attr("class", "nodes");

  // --- 原型节点 (Layer 1, 圆形图片) ---
  const archetypeG = nodeGroup.selectAll("g.node-archetype")
    .data(archetypeNodes, d => d.id)
    .join("g")
    .attr("class", "node-circle node-archetype")
    .attr("transform", d => `translate(${d.x}, ${d.y})`);

  archetypeG.append("image")
    .attr("class", "circle-archetype")
    .attr("x", -30).attr("y", -30)
    .attr("width", 60).attr("height", 60)
    .attr("clip-path", "url(#archClip)")

  // 红色描边圆环
  archetypeG.append("circle")
    .attr("class", "arch-stroke")
    .attr("r", 30)
    .attr("fill", "none")
    .attr("stroke", "#C8102E")
    .attr("stroke-width", 2.5)

  archetypeG.append("text")

    .attr("y", 38)
    .text(d => d.label);

  // --- 象征节点 (Layer 2, 蓝色中圆) ---
  const symbolG = nodeGroup.selectAll("g.node-symbol")
    .data(symbolNodes, d => d.id)
    .join("g")
    .attr("class", "node-circle node-symbol")
    .attr("transform", d => `translate(${d.x}, ${d.y})`);

  symbolG.append("circle")
    .attr("class", "circle-symbol")

    .attr("filter", "url(#shadow)");

  symbolG.append("text")

    .style("font-size", d => d.label.length > 2 ? "9px" : "10px")
    .text(d => d.label);

  // --- 范畴节点 (Layer 3, 黑色小圆, 标签在下方) ---
  const categoryG = nodeGroup.selectAll("g.node-category")

    .join("g")
    .attr("class", "node-circle node-category")

    .attr("class", "category-label")

  // --- 实例节点 (Layer 4, 纯文字) ---
  const instanceG = nodeGroup.selectAll("g.node-instance")
    .data(instanceNodes, d => d.id)
    .join("g")
    .attr("class", "node-instance")
    .attr("transform", d => `translate(${d.x}, ${d.y})`);

  instanceG.append("text")
    .attr("class", "instance-text")
    .text(d => d.label.length > 14 ? d.label.substring(0, 13) + "…" : d.label);

  // ========== 交互状态 ==========
  const hoveredNodeId = { current: null };
  const clickHighlightedIds = new Set();
  const idMap = new Map(nodesData.map(n => [n.id, n]));

  // 获取节点的所有关联节点（祖先 + 后代 + 自身）
  function getRelatedNodeIds(node) {
    const ids = new Set();
    ids.add(node.id);
    // 上溯祖先
    let current = node;
    while (current.parentId && idMap.has(current.parentId)) {
      ids.add(current.parentId);
      current = idMap.get(current.parentId);
    }
    // 下溯后代
    function collectDescendants(nid) {
      nodesData.filter(c => c.parentId === nid).forEach(c => {
        ids.add(c.id);
        collectDescendants(c.id);
      });
    }
    collectDescendants(node.id);
    return ids;
  }

  // 获取所有后代节点
  function getDescendantIds(node) {
    const ids = new Set();
    ids.add(node.id);
    function collect(nid) {
      nodesData.filter(c => c.parentId === nid).forEach(c => {
        ids.add(c.id);
        collect(c.id);
      });
    }
    collect(node.id);
    return ids;
  }

  // 更新所有节点的视觉状态
  function updateVisualState() {
    // 计算哪些节点应该高亮
    // 展开点击高亮：每个被点击节点的所有后代都高亮
    const allHighlightedIds = new Set();
    clickHighlightedIds.forEach(cid => {
      const node = idMap.get(cid);
      if (node) getDescendantIds(node).forEach(id => allHighlightedIds.add(id));
    });
    // 悬停高亮：展开上下游关联节点（仅当该节点未被点击高亮时）
    if (hoveredNodeId.current && !clickHighlightedIds.has(hoveredNodeId.current)) {
      getRelatedNodeIds(idMap.get(hoveredNodeId.current)).forEach(id => allHighlightedIds.add(id));
    }

    const hasAnyHighlight = allHighlightedIds.size > 0;

    // 更新圆形节点
    nodeGroup.selectAll("g.node-circle")
      .classed("node-dimmed", d => hasAnyHighlight && !allHighlightedIds.has(d.id))
      .classed("node-highlight", d => allHighlightedIds.has(d.id))
      .each(function(d) {
        const el = d3.select(this).select(d.layer === 1 ? "image" : "circle");
        const isHighlighted = allHighlightedIds.has(d.id);
        if (d.layer === 1) {
          el.attr("filter", isHighlighted ? "url(#glow-red)" : "url(#shadow)");
        } else if (d.layer === 2) {
          el.attr("filter", isHighlighted ? "url(#glow-blue)" : "url(#shadow)");
        }
      });

    // 更新实例文字节点
    nodeGroup.selectAll("g.node-instance")
      .classed("node-dimmed", d => hasAnyHighlight && !allHighlightedIds.has(d.id))
      .each(function(d) {
        const text = d3.select(this).select("text");
        text.classed("instance-highlight", allHighlightedIds.has(d.id));
      });

    // 更新连线高亮
    Object.values(allLinkGroups).forEach(linkSel => {
      linkSel.classed("link-highlight", l => {
        if (!hasAnyHighlight) return false;
        return allHighlightedIds.has(l.source.id) && allHighlightedIds.has(l.target.id);
      });
    });
  }

  function clearAllHighlights() {
    clickHighlightedIds.clear();
    hoveredNodeId.current = null;
    updateVisualState();
    hideTooltip();
  }

  // ========== Tooltip ==========
  function buildBreadcrumb(d) {
    const parts = [];
    let current = d;
    while (current) {
      parts.unshift(current.label);
      current = current.parentId ? idMap.get(current.parentId) : null;
    }
    return parts.join(" > ");
  }

  function showTooltip(event, d) {
    const tip = d3.select("#tooltip");
    tip.html(`
      <div class="tooltip-title">${d.label}</div>
      <div class="tooltip-breadcrumb">${buildBreadcrumb(d)}</div>
      ${d.desc ? '<div class="tooltip-desc">' + d.desc + '</div>' : ''}
    `);
    const tx = Math.min(event.pageX + 14, window.innerWidth - 296);
    const ty = Math.min(event.pageY - 20, window.innerHeight - 120);
    tip.style("left", tx + "px").style("top", ty + "px").classed("visible", true);
  }

  function hideTooltip() {
    d3.select("#tooltip").classed("visible", false);
  }

  // ========== 事件处理 ==========
  // 悬停：圆形节点
  nodeGroup.selectAll("g.node-circle")
    .on("mouseenter", function(event, d) {
      hoveredNodeId.current = d.id;
      updateVisualState();
    })
    .on("mouseleave", function() {
      hoveredNodeId.current = null;
      updateVisualState();
    });

  // 点击：圆形节点 → 高亮后代
  nodeGroup.selectAll("g.node-circle")
    .on("click", function(event, d) {
      event.stopPropagation();
      if (clickHighlightedIds.has(d.id)) {
        clickHighlightedIds.delete(d.id);
      } else {
        clickHighlightedIds.add(d.id);
      }
      updateVisualState();
    });

  // 悬停：实例文字 → 显示 tooltip
  nodeGroup.selectAll("g.node-instance")
    .on("mouseenter", function(event, d) {
      hoveredNodeId.current = d.id;
      updateVisualState();
      showTooltip(event, d);
    })
    .on("mousemove", function(event, d) {
      if (hoveredNodeId.current === d.id) {
        const tip = d3.select("#tooltip");
        const tx = Math.min(event.pageX + 14, window.innerWidth - 296);
        const ty = Math.min(event.pageY - 20, window.innerHeight - 120);
        tip.style("left", tx + "px").style("top", ty + "px");
      }
    })
    .on("mouseleave", function() {
      hoveredNodeId.current = null;
      updateVisualState();
      hideTooltip();
    });

  // 点击实例文字
  nodeGroup.selectAll("g.node-instance")
    .on("click", function(event, d) {
      event.stopPropagation();
      showTooltip(event, d);
    });

  // 双击空白 → 重置
  svg.on("dblclick", (event) => {
    if (event.target === svg.node()) {
      clearAllHighlights();
      svg.transition().duration(750)
        .call(zoom.transform, d3.zoomIdentity
          .translate(W / 2, H / 2)
          .scale(initScale)
          .translate(-CX, -CY));
    }
  });

  // 点击空白 → 清除高亮
  svg.on("click", (event) => {
    if (event.target === svg.node() && clickHighlightedIds.size > 0) {
      clearAllHighlights();
    }
    if (event.target === svg.node()) {
      hideTooltip();
    }
  });

  // ESC 清除
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") clearAllHighlights();
  });

  // ========== 拖拽 ==========
  function dragStart(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
    hideTooltip();
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragEnd(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    // 圆形节点（1-3层）：松手回弹到环上
    if (d.layer <= 3) {
      d.fx = null;
      d.fy = null;
    }
    // 实例文字（4层）：保留位置但允许力模拟轻微调整
    // 如果想要完全自由放置，保持 fx/fy；如果想要浮动，释放它们
    // 这里选择释放，让文字节点自由浮动
  }

  const drag = d3.drag()
    .on("start", dragStart)
    .on("drag", dragged)
    .on("end", dragEnd);

  nodeGroup.selectAll("g.node-circle").call(drag);
  nodeGroup.selectAll("g.node-instance").call(drag);

  // ========== Tick 更新 ==========
  simulation.on("tick", () => {
    linkArchetype
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

    linkSymbol
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

    linkInstance
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

    archetypeG.attr("transform", d => `translate(${d.x}, ${d.y})`);
    symbolG.attr("transform", d => `translate(${d.x}, ${d.y})`);
    categoryG.attr("transform", d => `translate(${d.x}, ${d.y})`);
    instanceG.attr("transform", d => `translate(${d.x}, ${d.y})`);
  });

  // ========== 窗口缩放 ==========
  window.addEventListener("resize", () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    svg.attr("width", w).attr("height", h);
    simulation
      .force("center", d3.forceCenter(w / 2, h / 2))
      .alpha(0.3).restart();
  });

  console.log("TRPG 叙事知识图谱已就绪: " + nodesData.length + " 个节点, " + linksData.length + " 条连线");
  console.log("  原型: " + archetypeNodes.length + " | 象征: " + symbolNodes.length +
              " | 范畴: " + categoryNodes.length + " | 实例: " + instanceNodes.length);
})();
</script>
</body>
</html>
